apiVersion: v1
kind: Namespace
metadata:
  name: dotnet-microservices

---
# =========================
# CONFIG + SECRETS
# =========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: dotnet-microservices
data:
  ASPNETCORE_URLS: "http://+:8080"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  KAFKA_BROKERS: "kafka-service:9092"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: dotnet-microservices
type: Opaque
stringData:
  DB_USER: root
  DB_PASSWORD: "1234"
  JWT_SECRET: mySecretKey12345678901234567890123456789012

---
# =========================
# MYSQL
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: dotnet-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "1234"
          ports:
            - containerPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: dotnet-microservices
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
# =========================
# USER SERVICE
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: dotnet-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: dotnet-user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DB_NAME
              value: "userdb"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: dotnet-microservices
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30011

