apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  ASPNETCORE_URLS: "http://+:8080"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "userdb"
  KAFKA_BROKERS: "host.docker.internal:9092"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  DB_USER: root
  DB_PASSWORD: "1234"
  JWT_SECRET: mySecretKey12345678901234567890123456789012

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "1234"
            - name: MYSQL_DATABASE
              value: "userdb"
          ports:
            - containerPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dotnet-app
  template:
    metadata:
      labels:
        app: dotnet-app
    spec:
      containers:
        - name: dotnet-app
          image: dotnet-service-1:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret

---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-app
spec:
  type: NodePort
  selector:
    app: dotnet-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30008